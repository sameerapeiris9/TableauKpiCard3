<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>KPI Card – Debug</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
<style>
  body { font-family: monospace; font-size: 12px; background: #f5f5f2; padding: 16px; margin: 0; }
  h3   { font-size: 13px; margin: 12px 0 6px; color: #333; }
  pre  { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px; white-space: pre-wrap; word-break: break-all; max-height: 260px; overflow-y: auto; }
  .ok  { color: #27500a; background: #eaf3de; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; }
  .err { color: #a32d2d; background: #fcebeb; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="status">Initialising…</div>
<h3>Encoding map (encodings[id].name)</h3>
<pre id="enc-out">waiting…</pre>
<h3>Row 0 keys (what getSummaryData returns)</h3>
<pre id="row-out">waiting…</pre>
<h3>Computed values</h3>
<pre id="val-out">waiting…</pre>

<script>
'use strict';
(function(){

  async function getSummaryData(ws) {
    var rows = [];
    var reader = await ws.getSummaryDataReaderAsync(undefined, { ignoreSelection: true });
    for (var i = 0; i < reader.pageCount; i++) {
      var page = await reader.getPageAsync(i);
      page.data.forEach(function(r) {
        var row = {};
        page.columns.forEach(function(col, idx) { row[col.fieldName] = r[idx]; });
        rows.push(row);
      });
    }
    await reader.releaseAsync();
    return rows;
  }

  async function getEncodingMap(ws) {
    var spec  = await ws.getVisualSpecificationAsync();
    var map   = {};
    if (spec.activeMarksSpecificationIndex < 0) return map;
    var marks = spec.marksSpecifications[spec.activeMarksSpecificationIndex];
    marks.encodings.forEach(function(e) { map[e.id] = e.field; });
    return map;
  }

  window.onload = tableau.extensions.initializeAsync().then(function() {
    var ws = tableau.extensions.worksheetContent.worksheet;

    async function update() {
      try {
        document.getElementById('status').className = 'ok';
        document.getElementById('status').textContent = '✓ Extension initialised — worksheet: ' + ws.name;

        var data      = await getSummaryData(ws);
        var encodings = await getEncodingMap(ws);

        /* show encoding map */
        var encDump = {};
        Object.keys(encodings).forEach(function(k){
          encDump[k] = encodings[k] ? {
            name: encodings[k].name,
            role: encodings[k].role,
            dataType: encodings[k].dataType
          } : null;
        });
        document.getElementById('enc-out').textContent = JSON.stringify(encDump, null, 2);

        /* show row 0 keys and raw values */
        if (data.length > 0) {
          var row0dump = {};
          var row0 = data[0];
          Object.keys(row0).forEach(function(k){
            var dv = row0[k];
            row0dump[k] = {
              value:          dv ? dv.value          : null,
              nativeValue:    dv ? dv.nativeValue    : null,
              formattedValue: dv ? dv.formattedValue : null
            };
          });
          document.getElementById('row-out').textContent =
            'total rows: ' + data.length + '\n\nrow[0]:\n' + JSON.stringify(row0dump, null, 2);
        } else {
          document.getElementById('row-out').textContent = 'NO ROWS RETURNED';
        }

        /* try to read values using encoding field names */
        var valDump = {};
        ['actual','previous','budget'].forEach(function(encId){
          if (!encodings[encId]) { valDump[encId] = 'ENCODING NOT FOUND'; return; }
          var fieldName = encodings[encId].name;
          valDump[encId + '_fieldName'] = fieldName;
          if (!data.length) { valDump[encId] = 'NO ROWS'; return; }
          var dv = data[0][fieldName];
          if (!dv) {
            /* try fallback: scan row keys for a key containing the field name */
            var fallback = Object.keys(data[0]).find(function(k){
              return k.indexOf(fieldName) !== -1 || fieldName.indexOf(k) !== -1;
            });
            valDump[encId + '_fallbackKey'] = fallback || 'NOT FOUND IN ROW';
            dv = fallback ? data[0][fallback] : null;
          }
          valDump[encId] = dv ? {
            value: dv.value, nativeValue: dv.nativeValue, formattedValue: dv.formattedValue
          } : 'NULL DataValue';
        });
        document.getElementById('val-out').textContent = JSON.stringify(valDump, null, 2);

      } catch(e) {
        document.getElementById('status').className = 'err';
        document.getElementById('status').textContent = 'ERROR: ' + String(e);
        console.error(e);
      }
    }

    ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, update);
    update();
  });

})();
</script>
</body>
</html>
