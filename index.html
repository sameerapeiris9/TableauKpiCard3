<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI Card</title>
<script src="../../lib/tableau.extensions.1.latest.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --page-bg:   #f5f5f2;
  --card-bg:   #ffffff;
  --border:    rgba(0,0,0,0.08);
  --t1:        #111827;
  --t2:        #6b7280;
  --t3:        #9ca3af;
  --up-text:   #3b6d11;
  --up-bg:     #eaf3de;
  --dn-text:   #a32d2d;
  --dn-bg:     #fcebeb;
  --neu-text:  #374151;
  --neu-bg:    #f3f4f6;
  --spark-col: #639922;
  --radius:    14px;
  --font:      'Inter', -apple-system, sans-serif;
}

html,body{
  width:100%;height:100%;
  background:var(--page-bg);
  font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ── PLACEHOLDER ── */
#ph{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  color:var(--t3);font-size:12px;text-align:center;padding:32px;
  max-width:300px;line-height:1.6;
}
#ph .ph-icon{opacity:.4;margin-bottom:4px}
#ph strong{font-size:13px;font-weight:500;color:var(--t2)}

/* ── CARD ── */
#card{
  display:none;
  width:calc(100% - 24px);
  max-width:420px;
  background:var(--card-bg);
  border-radius:var(--radius);
  border:0.5px solid var(--border);
  padding:20px 22px 18px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hd-label{
  font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t2);margin-bottom:2px;
}
.hd-period{font-size:10px;color:var(--t3);font-weight:400}

/* ── HERO ── */
.hero{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin:10px 0 3px;
}
.hero-val{
  font-size:36px;font-weight:500;color:var(--t1);
  letter-spacing:-0.025em;line-height:1;
}
.var-pill{
  display:flex;align-items:center;gap:4px;
  font-size:11.5px;font-weight:500;
  padding:4px 10px;border-radius:99px;
  white-space:nowrap;margin-bottom:2px;
}
.var-pill.up{background:var(--up-bg);color:var(--up-text)}
.var-pill.dn{background:var(--dn-bg);color:var(--dn-text)}
.var-pill.neu{background:var(--neu-bg);color:var(--neu-text)}

.hero-sub{font-size:10px;color:var(--t3);margin-bottom:12px}

/* ── DIVIDER ── */
.div{height:0.5px;background:var(--border);margin:12px 0}

/* ── COMPARISON ROWS ── */
.comp{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.comp:last-child{margin-bottom:0}
.comp-lbl{font-size:10.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.badges{display:flex;gap:4px;flex-shrink:0}
.badge{
  font-size:10px;font-weight:500;
  padding:2px 7px;border-radius:5px;white-space:nowrap;
}
.badge.up{background:var(--up-bg);color:var(--up-text)}
.badge.dn{background:var(--dn-bg);color:var(--dn-text)}
.badge.neu{background:var(--neu-bg);color:var(--neu-text)}

/* ── SPARKLINE ── */
.spark-wrap{position:relative}
#spark{width:100%;display:block;overflow:visible;}
.spark-axis{
  display:flex;justify-content:space-between;
  font-size:9px;color:var(--t3);margin-top:2px;
  font-variant-numeric:tabular-nums;
}

/* ── BUDGET ROW ── */
.budget-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;padding-top:12px;
  border-top:0.5px solid var(--border);
}
.budget-lbl{font-size:10.5px;color:var(--t2)}
.budget-tag{
  font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:5px;white-space:nowrap;
}
.budget-tag.met{background:var(--up-bg);color:var(--up-text)}
.budget-tag.miss{background:var(--dn-bg);color:var(--dn-text)}
.budget-tag.neu{background:var(--neu-bg);color:var(--neu-text)}

/* ── TOOLTIP ── */
#tip{
  position:fixed;background:rgba(17,24,39,.9);color:#fff;
  font-size:10px;font-family:var(--font);
  padding:4px 8px;border-radius:5px;
  pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity .12s;z-index:999;
  backdrop-filter:blur(4px);
}
</style>
</head>
<body>

<div id="ph">
  <svg class="ph-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <rect x="2" y="2" width="36" height="36" rx="8" stroke="#9ca3af" stroke-width="1.5"/>
    <path d="M8 28 L14 20 L20 23 L27 13 L32 16" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="16" r="2" fill="#9ca3af"/>
  </svg>
  <strong>KPI Card</strong>
  <span>Drop fields on the Marks card:<br>
    <b style="color:#6b7280">Actual Value</b> · <b style="color:#6b7280">Previous Period</b><br>
    <b style="color:#6b7280">Budget / Target</b> · <b style="color:#6b7280">Trend (Sparkline)</b>
  </span>
  <span style="margin-top:4px;font-size:10px;color:#9ca3af">
    Add a date to the Detail tile<br>for the sparkline time axis
  </span>
</div>

<div id="card">
  <div class="hd-label" id="hd-label">KPI Metric</div>
  <div class="hd-period" id="hd-period"></div>

  <div class="hero">
    <div class="hero-val" id="hero-val">—</div>
    <div class="var-pill neu" id="var-pill">—</div>
  </div>
  <div class="hero-sub" id="hero-sub"></div>

  <div class="div" id="div-comps" style="display:none"></div>
  <div id="comps-wrap" style="display:none">
    <div class="comp" id="comp-mom" style="display:none">
      <span class="comp-lbl">vs Previous Period (MoM)</span>
      <div class="badges">
        <span class="badge" id="mom-pct">—</span>
        <span class="badge" id="mom-abs">—</span>
      </div>
    </div>
    <div class="comp" id="comp-yoy" style="display:none">
      <span class="comp-lbl" id="yoy-label">vs Last Year</span>
      <div class="badges">
        <span class="badge" id="yoy-pct">—</span>
        <span class="badge" id="yoy-abs">—</span>
      </div>
    </div>
  </div>

  <div class="div" id="div-spark" style="display:none"></div>
  <div class="spark-wrap" id="spark-wrap" style="display:none">
    <svg id="spark" height="56"></svg>
    <div class="spark-axis" id="spark-axis"></div>
  </div>

  <div class="budget-row" id="budget-row" style="display:none">
    <span class="budget-lbl" id="budget-lbl">vs Budget</span>
    <span class="budget-tag" id="budget-tag">—</span>
  </div>
</div>

<div id="tip"></div>

<script>
'use strict';
(function(){

/* ── refs ─────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const NS = 'http://www.w3.org/2000/svg';

/* ── tooltip ──────────────────────────────────────── */
const tip = $('tip');
function showTip(e,t){tip.textContent=t;tip.style.opacity='1';moveTip(e)}
function moveTip(e){tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-30)+'px'}
function hideTip(){tip.style.opacity='0'}

/* ── card show/hide ───────────────────────────────── */
function showCard(){$('ph').style.display='none';$('card').style.display=''}
function showPh()  {$('ph').style.display='';$('card').style.display='none'}

/* ── number formatting ────────────────────────────── */
function fmt(n,currency=true){
  if(n===null||isNaN(n)) return '—';
  const pfx = currency?'$':'';
  const abs = Math.abs(n), sign = n<0?'-':'';
  if(abs>=1e9)  return sign+pfx+(abs/1e9).toFixed(2)+'B';
  if(abs>=1e6)  return sign+pfx+(abs/1e6).toFixed(2)+'M';
  if(abs>=1000) return sign+pfx+abs.toLocaleString('en-US',{maximumFractionDigits:0});
  return sign+pfx+abs.toFixed(abs<10?2:0);
}
function fmtPct(n){return n===null?'—':Math.abs(n).toFixed(1)+'%'}

/* ── DataValue helpers ────────────────────────────── */
function toNum(dv){
  if(!dv) return null;
  const n=parseFloat(dv.nativeValue!==undefined?dv.nativeValue:dv.value);
  return isNaN(n)?null:n;
}
function toStr(dv){
  if(!dv) return null;
  const v=dv.formattedValue!==undefined?dv.formattedValue:String(dv.value);
  return(v==='%null%'||v==='Null')?null:v;
}
function toFmt(dv){
  if(!dv) return null;
  const f=dv.formattedValue;
  if(f&&f!=='%null%'&&f!=='Null') return f;
  const n=toNum(dv); return n!==null?fmt(n):null;
}

/* ── prettify field name ──────────────────────────── */
function pretty(s){
  if(!s) return '';
  return s.replace(/^(SUM|AVG|MIN|MAX|COUNT|ATTR)\((.+)\)$/i,'$2')
          .replace(/[_-]/g,' ')
          .replace(/\b\w/g,c=>c.toUpperCase()).trim();
}

/* ── badge helper ─────────────────────────────────── */
function setBadge(el,val,isAbs){
  if(val===null){el.textContent='—';el.className='badge neu';return}
  const up=val>=0;
  el.className='badge '+(up?'up':'dn');
  if(isAbs){
    el.textContent=(up?'+':'')+fmt(val);
  } else {
    el.textContent=(up?'▲ ':'▼ ')+fmtPct(val);
  }
}

/* ── SVG element factory ──────────────────────────── */
function svgEl(tag,attrs){
  const el=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
  return el;
}

/* ── Tableau init ─────────────────────────────────── */
let ws=null;
window.onload=()=>{
  tableau.extensions.initializeAsync().then(()=>{
    ws=tableau.extensions.worksheetContent.worksheet;
    ws.addEventListener(tableau.TableauEventType.SummaryDataChanged,refresh);
    refresh();
  },err=>{console.error('KPI Card:',err);showPh()});
};

/* ── main refresh ─────────────────────────────────── */
async function refresh(){
  try{
    const[encMap,{cols,rows}]=await Promise.all([getEncodings(),getData()]);
    render(encMap,cols,rows);
  }catch(e){console.error('refresh:',e)}
}

/* ── encoding map ─────────────────────────────────── */
async function getEncodings(){
  const spec=await ws.getVisualSpecificationAsync();
  const marks=spec.marksSpecifications[spec.activeMarksSpecificationIndex];
  const m={};
  for(const e of marks.encodings){
    if(!m[e.id]) m[e.id]=[];
    if(e.field?.name) m[e.id].push(e.field.name);
  }
  return m;
}

/* ── summary data ─────────────────────────────────── */
async function getData(){
  const rdr=await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
  const pages=[];
  for(let p=0;p<rdr.pageCount;p++) pages.push(await rdr.getPageAsync(p));
  await rdr.releaseAsync();
  if(!pages.length) return{cols:[],rows:[]};
  const cols=pages[0].columns.map(c=>({name:c.fieldName,idx:c.index}));
  const rows=pages.flatMap(pg=>pg.data);
  return{cols,rows};
}

/* ── render ───────────────────────────────────────── */
function render(enc,cols,rows){
  if(!rows.length){showPh();return}

  /* helpers */
  function ci(name){const c=cols.find(c=>c.name===name);return c?c.idx:-1}
  function cell(row,name){const i=ci(name);return i>=0?row[i]:null}
  function firstOf(enc_id){
    const f=(enc[enc_id]||[])[0];
    if(!f||!rows.length) return{v:null,fmt:null,field:null};
    const dv=cell(rows[0],f);
    return{v:toNum(dv),fmt:toFmt(dv),field:f};
  }

  /* ── values ── */
  const actual   = firstOf('actual');
  const previous = firstOf('previous');
  const budget   = firstOf('budget');

  /* trend: collect all rows for the 'trend' encoding field */
  const trendField=(enc['trend']||[])[0];
  let trendVals=[], trendLabels=[];
  if(trendField){
    const fi=ci(trendField);
    if(fi>=0){
      /* also grab a date/string from the Detail or Tooltip tile for axis labels */
      const detailField=(enc['detail']||enc['tooltip']||[])[0];
      const di=detailField?ci(detailField):-1;
      rows.forEach(r=>{
        const n=toNum(r[fi]);
        if(n!==null){
          trendVals.push(n);
          trendLabels.push(di>=0?toStr(r[di]):'');
        }
      });
    }
  }

  if(actual.v===null&&trendVals.length===0){showPh();return}
  showCard();

  /* ── header ── */
  $('hd-label').textContent=actual.field?pretty(actual.field):'KPI Metric';

  /* period: try to get from Detail/Tooltip first row, else blank */
  const detF=(enc['detail']||enc['tooltip']||[])[0];
  const periodDv=detF&&rows.length?cell(rows[rows.length-1],detF):null;
  $('hd-period').textContent=periodDv?toStr(periodDv)||'':'';

  /* ── hero ── */
  $('hero-val').textContent=actual.fmt||fmt(actual.v)||'—';

  /* MoM delta */
  let momDelta=null, momPct=null;
  if(actual.v!==null&&previous.v!==null&&previous.v!==0){
    momDelta=actual.v-previous.v;
    momPct=(momDelta/Math.abs(previous.v))*100;
  }

  /* hero pill */
  const pill=$('var-pill');
  if(momDelta!==null){
    const up=momDelta>=0;
    pill.className='var-pill '+(up?'up':'dn');
    pill.textContent=(up?'▲ ':'▼ ')+(up?'+':'')+fmt(momDelta)+' vs prev';
    $('hero-sub').textContent=previous.field?'vs '+pretty(previous.field):'vs previous period';
  } else {
    pill.style.display='none';
    $('hero-sub').textContent='';
  }

  /* ── MoM comparison row ── */
  const showMom=momDelta!==null;
  $('comp-mom').style.display=showMom?'':'none';
  if(showMom){setBadge($('mom-pct'),momPct,false);setBadge($('mom-abs'),momDelta,true)}

  /* ── YoY: if we have trend data spanning 12+ points, compute vs 12 periods ago ── */
  let yoyDelta=null, yoyPct=null, showYoy=false;
  if(trendVals.length>=13){
    const curr=trendVals[trendVals.length-1];
    const prev12=trendVals[trendVals.length-13];
    if(prev12!==0){
      yoyDelta=curr-prev12;
      yoyPct=(yoyDelta/Math.abs(prev12))*100;
      showYoy=true;
    }
  }
  $('comp-yoy').style.display=showYoy?'':'none';
  if(showYoy){setBadge($('yoy-pct'),yoyPct,false);setBadge($('yoy-abs'),yoyDelta,true)}

  const showComps=showMom||showYoy;
  $('div-comps').style.display=showComps?'':'none';
  $('comps-wrap').style.display=showComps?'':'none';

  /* ── sparkline ── */
  const showSpark=trendVals.length>=2;
  $('div-spark').style.display=showSpark?'':'none';
  $('spark-wrap').style.display=showSpark?'':'none';
  if(showSpark) renderSpark(trendVals,trendLabels,budget.v);

  /* ── budget ── */
  const showBudget=actual.v!==null&&budget.v!==null;
  $('budget-row').style.display=showBudget?'':'none';
  if(showBudget){
    const pct=((actual.v/budget.v)*100);
    const diff=actual.v-budget.v;
    const diffPct=Math.abs(pct-100).toFixed(1);
    const met=actual.v>=budget.v;
    const tag=$('budget-tag');
    tag.className='budget-tag '+(met?'met':'miss');
    tag.textContent=(met?'▲ '+diffPct+'% above · ':'▼ '+diffPct+'% below · ')+fmt(budget.v);
    $('budget-lbl').textContent=budget.field?'vs '+pretty(budget.field):'vs Budget';
  }
}

/* ── sparkline renderer ───────────────────────────── */
function renderSpark(vals,labels,targetV){
  const svg=$('spark');
  const W=svg.clientWidth||380;
  const H=56;
  const P={t:8,r:8,b:6,l:4};
  const pw=W-P.l-P.r, ph=H-P.t-P.b;

  const minV=Math.min(...vals), maxV=Math.max(...vals);
  const rng=maxV-minV||1;
  const sx=i=>P.l+(i/(vals.length-1))*pw;
  const sy=v=>P.t+ph-((v-minV)/rng)*ph;
  const pts=vals.map((v,i)=>[sx(i),sy(v)]);

  /* clear */
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

  /* defs: gradient fill + clip */
  const defs=svgEl('defs');

  const grad=svgEl('linearGradient',{id:'sg',x1:'0',y1:'0',x2:'0',y2:'1'});
  const s1=svgEl('stop',{'offset':'0%','stop-color':'#639922','stop-opacity':'0.20'});
  const s2=svgEl('stop',{'offset':'100%','stop-color':'#639922','stop-opacity':'0'});
  grad.append(s1,s2);

  defs.append(grad);
  svg.append(defs);

  /* area fill */
  const aD=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')
    +` L${pts[pts.length-1][0]},${H-P.b} L${pts[0][0]},${H-P.b} Z`;
  svg.append(svgEl('path',{d:aD,fill:'url(#sg)'}));

  /* optional target dashed line */
  if(targetV!==null){
    const clamped=Math.min(Math.max(targetV,minV),maxV);
    const ty=sy(clamped);
    svg.append(svgEl('line',{
      x1:P.l,y1:ty,x2:W-P.r,y2:ty,
      stroke:'#d1d5db','stroke-width':'1','stroke-dasharray':'4,3'
    }));
  }

  /* trend line */
  const lineD=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  svg.append(svgEl('path',{d:lineD,fill:'none',stroke:'#639922','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'}));

  /* dots — coloured by vs target */
  function dotColor(v){
    if(targetV===null) return '#639922';
    return v>=targetV?'#3b6d11':'#a32d2d';
  }

  pts.forEach(([x,y],i)=>{
    /* invisible wider hit area */
    const hit=svgEl('circle',{cx:x,cy:y,r:'8',fill:'transparent'});
    const label=labels[i]?labels[i]:fmt(vals[i]);
    hit.addEventListener('mouseenter',e=>showTip(e,label+' · '+fmt(vals[i])));
    hit.addEventListener('mousemove',moveTip);
    hit.addEventListener('mouseleave',hideTip);

    const c=svgEl('circle',{cx:x,cy:y,r:'3',fill:dotColor(vals[i]),stroke:'#fff','stroke-width':'1.5'});
    svg.append(hit,c);
  });

  /* last value label */
  const lp=pts[pts.length-1];
  const lastLbl=svgEl('text',{
    x:lp[0]-5,y:lp[1]-8,
    'text-anchor':'end','font-size':'8.5',
    'font-family':"'Inter',sans-serif",fill:'#9ca3af','letter-spacing':'0.04em'
  });
  lastLbl.textContent='LATEST';
  svg.append(lastLbl);

  /* axis labels: first and last */
  const ax=$('spark-axis');
  ax.innerHTML='';
  if(labels.length>=2){
    const first=document.createElement('span');
    first.textContent=labels[0]||'';
    const last=document.createElement('span');
    last.textContent=labels[labels.length-1]||'';
    ax.append(first,last);
  }
}

})();
</script>
</body>
</html>
