<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI Card</title>

<!-- Tableau Extensions API – adjust relative path if needed -->
<script src="../../lib/tableau.extensions.1.latest.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ─── RESET ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ─── TOKENS ─────────────────────────────────────────────────────────────── */
:root{
  --bg:       #f0f4f8;
  --card:     #ffffff;
  --border:   #e2e8f0;
  --t1:       #0f172a;
  --t2:       #475569;
  --t3:       #94a3b8;
  --up:       #059669;
  --up-bg:    rgba(5,150,105,.10);
  --dn:       #dc2626;
  --dn-bg:    rgba(220,38,38,.10);
  --warn:     #d97706;
  --warn-bg:  rgba(217,119,6,.10);
  --blue:     #0284c7;
  --blue-bg:  rgba(2,132,199,.10);
  --radius:   14px;
  --shadow:   0 2px 8px rgba(15,23,42,.07),0 8px 24px rgba(15,23,42,.06);
  --mono:     'IBM Plex Mono',monospace;
  --sans:     'IBM Plex Sans',sans-serif;
}

/* ─── PAGE ───────────────────────────────────────────────────────────────── */
html,body{
  width:100%;height:100%;
  font-family:var(--sans);
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* ─── PLACEHOLDER ────────────────────────────────────────────────────────── */
#ph{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  color:var(--t3);font-size:12px;text-align:center;padding:32px;
}
#ph strong{font-size:13px;color:var(--t2);font-weight:600;}

/* ─── CARD ───────────────────────────────────────────────────────────────── */
#card{
  display:none;
  width:calc(100% - 20px);max-width:500px;
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  padding:18px 20px 16px;
  animation:up .35s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ─── HEADER ─────────────────────────────────────────────────────────────── */
.hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.hd-left{}
.kpi-title{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t2);
}
.kpi-period{
  font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;
  color:var(--t3);margin-top:2px;
}

/* ─── HERO VALUE ─────────────────────────────────────────────────────────── */
.hero{display:flex;align-items:center;gap:10px;margin:8px 0 14px}
.hero-val{
  font-family:var(--mono);font-size:34px;font-weight:600;
  letter-spacing:-.02em;color:var(--t1);line-height:1;
}
.dot{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
  background:var(--up);box-shadow:0 0 0 3px var(--up-bg);
}
.dot.dn{background:var(--dn);box-shadow:0 0 0 3px var(--dn-bg);}
.dot.neu{background:var(--t3);box-shadow:none;}

/* ─── COMPARISONS ────────────────────────────────────────────────────────── */
.comps{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.comp-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.comp-lbl{font-size:10px;color:var(--t3);max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badges{display:flex;gap:5px;flex-shrink:0;}
.badge{
  display:inline-flex;align-items:center;gap:2px;
  font-size:10px;font-weight:600;font-family:var(--mono);
  padding:2px 7px;border-radius:5px;white-space:nowrap;
}
.badge.up {background:var(--up-bg);color:var(--up);}
.badge.dn {background:var(--dn-bg);color:var(--dn);}
.badge.neu{background:var(--blue-bg);color:var(--blue);}

/* ─── BUDGET BAR ─────────────────────────────────────────────────────────── */
.budget{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.budget-lbl{font-size:10px;color:var(--t3);white-space:nowrap;}
.track-wrap{flex:1;display:flex;flex-direction:column;gap:3px;}
.track{height:5px;border-radius:99px;background:var(--border);overflow:hidden;}
.fill{height:100%;border-radius:99px;min-width:3px;transition:width .5s ease;}
.fill.over {background:var(--up);}
.fill.under{background:var(--warn);}
.track-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);font-family:var(--mono);}
.budget-tag{
  font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;white-space:nowrap;
}
.budget-tag.over {background:var(--up-bg);color:var(--up);}
.budget-tag.under{background:var(--warn-bg);color:var(--warn);}

/* ─── SPARKLINE ──────────────────────────────────────────────────────────── */
.spark-wrap{position:relative;}
#spark{width:100%;display:block;overflow:visible;}
.legend{display:flex;gap:12px;justify-content:flex-end;margin-top:5px;}
.leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* ─── TOOLTIP ────────────────────────────────────────────────────────────── */
#tip{
  position:fixed;background:var(--t1);color:#fff;
  font-size:10px;font-family:var(--mono);
  padding:4px 8px;border-radius:5px;
  pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity .12s;z-index:999;
}
</style>
</head>
<body>

<!-- Placeholder -->
<div id="ph">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="40" height="40" rx="9" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M9 30 L15 21 L21 25 L29 14 L35 18" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="35" cy="18" r="2.5" fill="#cbd5e1"/>
    <line x1="9" y1="34" x2="35" y2="34" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <strong>KPI Card</strong>
  <div>Drop fields on the Marks card tiles:<br>
    <b style="color:#64748b">KPI Value</b> · <b style="color:#64748b">Target/Budget</b> ·
    <b style="color:#64748b">Comp 1 Delta</b> · <b style="color:#64748b">Comp 2 Delta</b>
  </div>
  <div style="margin-top:4px;font-size:10px;">
    Use <b style="color:#64748b">Detail</b> tile for sparkline (time series rows)<br>
    Use <b style="color:#64748b">Tooltip</b> for period label &amp; comparison labels
  </div>
</div>

<!-- KPI Card -->
<div id="card">
  <div class="hd">
    <div class="hd-left">
      <div class="kpi-title" id="kpi-title">KPI Metric</div>
      <div class="kpi-period" id="kpi-period"></div>
    </div>
  </div>

  <div class="hero">
    <div class="hero-val" id="hero-val">—</div>
    <div class="dot neu" id="status-dot"></div>
  </div>

  <div class="comps" id="comps">
    <div class="comp-row" id="c1-row" style="display:none">
      <span class="comp-lbl" id="c1-lbl"></span>
      <div class="badges">
        <span class="badge" id="c1-pct"></span>
        <span class="badge" id="c1-abs"></span>
      </div>
    </div>
    <div class="comp-row" id="c2-row" style="display:none">
      <span class="comp-lbl" id="c2-lbl"></span>
      <div class="badges">
        <span class="badge" id="c2-pct"></span>
        <span class="badge" id="c2-abs"></span>
      </div>
    </div>
  </div>

  <div class="budget" id="budget" style="display:none">
    <span class="budget-lbl">vs. Budget</span>
    <div class="track-wrap">
      <div class="track"><div class="fill" id="fill"></div></div>
      <div class="track-meta">
        <span id="b-pct"></span>
        <span id="b-target"></span>
      </div>
    </div>
    <span class="budget-tag" id="b-tag"></span>
  </div>

  <div class="spark-wrap" id="spark-section" style="display:none">
    <svg id="spark" height="60"></svg>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#059669"></div>On/Over Target</div>
      <div class="leg"><div class="leg-dot" style="background:#0284c7"></div>No Target Set</div>
      <div class="leg"><div class="leg-dot" style="background:#d97706"></div>Under Target</div>
    </div>
  </div>
</div>

<div id="tip"></div>

<script>
'use strict';
(function(){

  /* ── helpers ─────────────────────────────────────────────────────── */
  const $  = id => document.getElementById(id);
  const NS = 'http://www.w3.org/2000/svg';

  function svgEl(tag, attrs){
    const el = document.createElementNS(NS, tag);
    Object.entries(attrs||{}).forEach(([k,v])=>el.setAttribute(k,v));
    return el;
  }

  function fmtNum(n){
    if(n===null||n===undefined||isNaN(n)) return '—';
    const abs=Math.abs(n), sign=n<0?'-':'';
    if(abs>=1e9)  return sign+'$'+(abs/1e9).toFixed(2)+'B';
    if(abs>=1e6)  return sign+'$'+(abs/1e6).toFixed(2)+'M';
    if(abs>=1e3)  return sign+'$'+abs.toLocaleString('en-US',{maximumFractionDigits:0});
    return sign+'$'+abs.toFixed(2);
  }

  function nativeNum(dv){
    if(!dv) return null;
    const n = parseFloat(dv.nativeValue !== undefined ? dv.nativeValue : dv.value);
    return isNaN(n) ? null : n;
  }

  function fmtVal(dv){
    if(!dv) return null;
    const f = dv.formattedValue;
    if(f && f!=='%null%' && f!=='Null') return f;
    const n = nativeNum(dv);
    return n!==null ? fmtNum(n) : null;
  }

  function strVal(dv){
    if(!dv) return null;
    const v = dv.formattedValue !== undefined ? dv.formattedValue : String(dv.value);
    return (v==='%null%'||v==='Null') ? null : v;
  }

  /* ── tooltip ─────────────────────────────────────────────────────── */
  const tip = $('tip');
  function showTip(e,txt){ tip.textContent=txt; tip.style.opacity='1'; moveTip(e); }
  function moveTip(e){ tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-28)+'px'; }
  function hideTip(){ tip.style.opacity='0'; }

  /* ── show / hide card ─────────────────────────────────────────────── */
  function showCard(){ $('ph').style.display='none'; $('card').style.display=''; }
  function showPh()  { $('ph').style.display=''; $('card').style.display='none'; }

  /* ── Tableau init ────────────────────────────────────────────────── */
  let ws = null;

  window.onload = function(){
    tableau.extensions.initializeAsync().then(()=>{
      ws = tableau.extensions.worksheetContent.worksheet;
      ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, refresh);
      refresh();
    }, err => {
      console.error('KPI Card init:', err);
      showPh();
    });
  };

  /* ── main refresh ─────────────────────────────────────────────────── */
  async function refresh(){
    try{
      const [encMap, data] = await Promise.all([getEncodings(), getData()]);
      render(encMap, data);
    } catch(e){ console.error('KPI refresh:', e); }
  }

  /* ── build encoding map ───────────────────────────────────────────── */
  async function getEncodings(){
    const spec   = await ws.getVisualSpecificationAsync();
    const marks  = spec.marksSpecifications[spec.activeMarksSpecificationIndex];
    const map    = {};
    for(const enc of marks.encodings){
      if(!map[enc.id]) map[enc.id]=[];
      if(enc.field?.name) map[enc.id].push(enc.field.name);
    }
    return map;
  }

  /* ── fetch all summary rows ───────────────────────────────────────── */
  async function getData(){
    const reader = await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
    const pages  = [];
    for(let p=0;p<reader.pageCount;p++) pages.push(await reader.getPageAsync(p));
    await reader.releaseAsync();
    if(!pages.length) return {cols:[], rows:[]};
    const cols = pages[0].columns.map(c=>({name:c.fieldName,idx:c.index}));
    const rows = pages.flatMap(pg=>pg.data);
    return {cols, rows};
  }

  /* ── render ───────────────────────────────────────────────────────── */
  function render(enc, {cols, rows}){
    if(!rows.length){ showPh(); return; }

    function cidx(name){ const c=cols.find(c=>c.name===name); return c?c.idx:-1; }
    function cell(row,name){ const i=cidx(name); return i>=0?row[i]:null; }
    function firstNum(fieldArr){
      if(!fieldArr?.length) return {v:null,fmt:null,field:null};
      const dv = cell(rows[0], fieldArr[0]);
      return {v:nativeNum(dv), fmt:fmtVal(dv), field:fieldArr[0]};
    }

    /* ── main value ── */
    const valF  = enc['value'] || [];
    const {v:mainV, fmt:mainFmt, field:mainField} = firstNum(valF);

    /* ── target ── */
    const {v:targV, fmt:targFmt} = firstNum(enc['target']||[]);

    /* ── comparisons ── */
    const {v:c1v, fmt:c1fmt, field:c1field} = firstNum(enc['comp1']||[]);
    const {v:c2v, fmt:c2fmt, field:c2field} = firstNum(enc['comp2']||[]);

    /* ── sparkline trend – use the Detail tile (id:"detail") or all rows of value field ── */
    // Collect all rows of the KPI value field for sparkline
    let trendVals = [];
    if(valF.length){
      const fi = cidx(valF[0]);
      if(fi>=0) trendVals = rows.map(r=>nativeNum(r[fi])).filter(v=>v!==null);
    }

    /* ── period & comp labels from Tooltip tile ── */
    // The Detail tile field names carry the period/label info
    // We use the field names themselves as labels for comparisons
    let periodLabel = '';
    // Try to grab a date/string field from Detail encoding
    const detailFields = enc['detail'] || enc['tooltip'] || [];
    if(detailFields.length && rows.length){
      const dv = cell(rows[0], detailFields[0]);
      if(dv) periodLabel = strVal(dv) || '';
    }

    /* ── guard: need at least the main value ── */
    if(mainV === null && trendVals.length === 0){ showPh(); return; }
    showCard();

    /* ── title: use the field name, prettified ── */
    $('kpi-title').textContent = mainField ? prettify(mainField) : 'KPI Metric';
    $('kpi-period').textContent = periodLabel;

    /* ── hero value ── */
    $('hero-val').textContent = mainFmt || fmtNum(mainV);

    /* ── status dot ── */
    const dot = $('status-dot');
    if(mainV!==null && targV!==null){
      dot.className = 'dot ' + (mainV>=targV?'':'dn');
    } else {
      dot.className = 'dot neu';
    }

    /* ── comparison rows ── */
    renderComp('c1-row','c1-lbl','c1-pct','c1-abs', c1v, c1fmt, c1field, mainV);
    renderComp('c2-row','c2-lbl','c2-pct','c2-abs', c2v, c2fmt, c2field, mainV);

    const anyComp = c1v!==null || c2v!==null;
    $('comps').style.display = anyComp ? '' : 'none';

    /* ── budget bar ── */
    renderBudget(mainV, targV, targFmt);

    /* ── sparkline ── */
    renderSpark(trendVals, targV);
  }

  /* ── comparison row ───────────────────────────────────────────────── */
  function renderComp(rowId,lblId,pctId,absId, delta, deltaFmt, fieldName, mainV){
    const row = $(rowId);
    if(delta===null){ row.style.display='none'; return; }
    row.style.display='';

    $(lblId).textContent = fieldName ? prettify(fieldName) : 'Comparison';

    const isUp = delta >= 0;
    const cls  = isUp ? 'badge up' : 'badge dn';
    const arr  = isUp ? '▲' : '▼';

    // % change: delta / (mainV - delta) × 100
    const prev = mainV !== null ? mainV - delta : null;
    const pct  = (prev && prev!==0) ? Math.abs(delta/prev*100) : null;

    $(pctId).className = cls;
    $(pctId).textContent = arr + ' ' + (pct!==null ? pct.toFixed(1)+'%' : '—');

    $(absId).className = cls;
    $(absId).textContent = (isUp?'+':'') + (deltaFmt || fmtNum(delta));
  }

  /* ── budget bar ───────────────────────────────────────────────────── */
  function renderBudget(mainV, targV, targFmt){
    const sec = $('budget');
    if(mainV===null || targV===null || targV===0){ sec.style.display='none'; return; }
    sec.style.display='';

    const pct     = mainV/targV*100;
    const clipped = Math.min(Math.max(pct,0),100);
    const isOver  = mainV >= targV;
    const diffPct = Math.abs(pct-100).toFixed(1);

    const fill = $('fill');
    fill.style.width  = clipped+'%';
    fill.className    = 'fill '+(isOver?'over':'under');

    $('b-pct').textContent    = Math.round(pct)+'%';
    $('b-target').textContent = targFmt || fmtNum(targV);

    const tag = $('b-tag');
    tag.className   = 'budget-tag '+(isOver?'over':'under');
    tag.textContent = diffPct+'% '+(isOver?'ABOVE':'BELOW')+' BUDGET';
  }

  /* ── sparkline ────────────────────────────────────────────────────── */
  function renderSpark(values, targV){
    const sec = $('spark-section');
    if(values.length < 2){ sec.style.display='none'; return; }
    sec.style.display='';

    const svg  = $('spark');
    const W    = svg.clientWidth || 460;
    const H    = 60;
    const PAD  = {t:8,r:6,b:10,l:6};
    const pw   = W-PAD.l-PAD.r;
    const ph   = H-PAD.t-PAD.b;

    const minV = Math.min(...values);
    const maxV = Math.max(...values);
    const rng  = maxV-minV||1;

    const sx = i => PAD.l + (i/(values.length-1))*pw;
    const sy = v => PAD.t + ph - ((v-minV)/rng)*ph;
    const pts = values.map((v,i)=>[sx(i),sy(v)]);

    // colour per point
    function ptColor(v){
      if(targV===null) return '#0284c7';
      return v>=targV ? '#059669' : '#d97706';
    }

    // clear
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

    // defs – gradient
    const defs = svgEl('defs');
    const grad = svgEl('linearGradient',{id:'spGrad',x1:'0',y1:'0',x2:'0',y2:'1'});
    const s1   = svgEl('stop',{'offset':'0%','stop-color':'#0284c7','stop-opacity':'0.12'});
    const s2   = svgEl('stop',{'offset':'100%','stop-color':'#0284c7','stop-opacity':'0'});
    grad.append(s1,s2); defs.append(grad); svg.append(defs);

    // area
    const areaD = pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ')
      + ` L${pts[pts.length-1][0]},${H-PAD.b} L${pts[0][0]},${H-PAD.b} Z`;
    svg.append(svgEl('path',{d:areaD,fill:'url(#spGrad)'}));

    // target line
    if(targV!==null){
      const ty = sy(Math.min(Math.max(targV,minV),maxV));
      svg.append(svgEl('line',{
        x1:PAD.l,y1:ty,x2:W-PAD.r,y2:ty,
        stroke:'#94a3b8','stroke-width':'1','stroke-dasharray':'4,3'
      }));
    }

    // segments
    for(let i=1;i<pts.length;i++){
      svg.append(svgEl('line',{
        x1:pts[i-1][0],y1:pts[i-1][1],x2:pts[i][0],y2:pts[i][1],
        stroke:ptColor(values[i]),'stroke-width':'2','stroke-linecap':'round'
      }));
    }

    // dots
    pts.forEach(([x,y],i)=>{
      const c = svgEl('circle',{cx:x,cy:y,r:'3.5',fill:ptColor(values[i]),stroke:'#fff','stroke-width':'1.5'});
      c.style.cursor='pointer';
      c.addEventListener('mouseenter', e=>showTip(e, fmtNum(values[i])));
      c.addEventListener('mousemove',  moveTip);
      c.addEventListener('mouseleave', hideTip);
      svg.append(c);
    });

    // "LATEST" label on last point
    const lp = pts[pts.length-1];
    const lbl = svgEl('text',{
      x:lp[0]-4, y:lp[1]-8,
      'text-anchor':'end','font-size':'7.5',
      'font-family':'IBM Plex Mono,monospace',
      fill:'#94a3b8','letter-spacing':'0.06em'
    });
    lbl.textContent='LATEST';
    svg.append(lbl);
  }

  /* ── prettify field name ──────────────────────────────────────────── */
  function prettify(name){
    return name
      .replace(/^(SUM|AVG|MIN|MAX|COUNT|ATTR)\((.+)\)$/i,'$2')
      .replace(/[_\-]/g,' ')
      .replace(/\b\w/g,c=>c.toUpperCase())
      .trim();
  }

})();
</script>
</body>
</html>
