<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI Card</title>
<script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --page:#f0f0ec;
  --card:#fff;
  --bdr:rgba(0,0,0,0.07);
  --t1:#0f0f0f;
  --t2:#5f5f5f;
  --t3:#aaa;
  --surf:#f5f5f2;
  --track:#e4e4df;
  --g-bg:#eaf3de;--g-hi:#1a3d08;--g-mid:#3b6d11;--g-bar:#639922;
  --r-bg:#fcebeb;--r-hi:#5c1515;--r-mid:#a32d2d;--r-bar:#e24b4a;
  --a-bg:#faeeda;--a-hi:#633806;--a-mid:#854f0b;--a-bar:#ef9f27;
}
html,body{
  width:100%;height:100%;
  background:var(--page);
  font-family:'Inter',-apple-system,sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#app{width:calc(100% - 20px);max-width:400px;position:relative;}

/* ── CARD ── */
#card{
  background:var(--card);
  border-radius:16px;
  border:0.5px solid var(--bdr);
  padding:20px 20px 18px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04),0 6px 28px rgba(0,0,0,0.07);
  animation:rise .32s cubic-bezier(.22,.68,0,1.15) both;
}
@keyframes rise{from{opacity:0;transform:translateY(6px) scale(.985)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;}
.hdr-left{display:flex;align-items:center;gap:8px;min-width:0;}
.metric-name{
  font-size:11px;font-weight:600;letter-spacing:.09em;
  text-transform:uppercase;color:var(--t2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.edit-btn{
  flex-shrink:0;cursor:pointer;background:none;border:none;padding:2px;
  color:var(--t3);display:flex;align-items:center;
  border-radius:4px;transition:color .15s;
}
.edit-btn:hover{color:var(--t2);}
.hdr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.status-pill{
  font-size:9px;font-weight:600;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 9px;border-radius:99px;
  white-space:nowrap;
}

/* ── HERO ── */
.hero-val{
  font-size:40px;font-weight:600;color:var(--t1);
  letter-spacing:-0.03em;line-height:1;margin-bottom:8px;
}
.hero-sub{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.delta-chip{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:500;padding:3px 10px;
  border-radius:7px;white-space:nowrap;flex-shrink:0;
}
.delta-chip svg{flex-shrink:0;}
.vs-text{font-size:10.5px;color:var(--t3);}

/* ── DIVIDER ── */
.div{height:0.5px;background:var(--bdr);margin-bottom:14px;}

/* ── INSIGHT TILES — compact ── */
.insight-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.ins-tile{border-radius:10px;padding:10px 12px;}
.ins-top{
  display:flex;align-items:center;gap:4px;
  font-size:9px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;margin-bottom:6px;
}
.ins-val{font-size:18px;font-weight:600;letter-spacing:-0.02em;line-height:1;margin-bottom:3px;}
.ins-sub{font-size:9.5px;line-height:1.3;}

/* ── ATTAINMENT ── */
.attain{background:var(--surf);border-radius:10px;padding:11px 13px;}
.att-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.att-lbl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--t2);}
.att-pct{font-size:12px;font-weight:600;}
.track{height:5px;background:var(--track);border-radius:99px;overflow:hidden;margin-bottom:5px;}
.track-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.22,.68,0,1);}
.att-foot{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);}

/* ── SETTINGS POPOVER ── */
#settings-overlay{
  display:none;position:absolute;inset:0;z-index:10;
  background:rgba(240,240,236,0.6);
  border-radius:16px;
  align-items:center;justify-content:center;
}
#settings-overlay.open{display:flex;}
.settings-box{
  background:var(--card);border:0.5px solid var(--bdr);
  border-radius:14px;padding:18px 18px 16px;
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  width:260px;
}
.settings-box h4{
  font-size:11px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--t2);margin-bottom:12px;
}
.settings-box input{
  width:100%;border:0.5px solid rgba(0,0,0,0.14);
  border-radius:8px;padding:8px 10px;font-size:13px;
  font-family:inherit;color:var(--t1);outline:none;
  background:#fff;margin-bottom:12px;
}
.settings-box input:focus{border-color:rgba(0,0,0,0.3);}
.settings-actions{display:flex;gap:7px;justify-content:flex-end;}
.btn{
  font-size:11px;font-weight:500;padding:6px 14px;
  border-radius:7px;cursor:pointer;border:0.5px solid var(--bdr);
  background:var(--surf);color:var(--t2);font-family:inherit;
  transition:background .15s;
}
.btn:hover{background:#ececea;}
.btn.primary{background:var(--t1);color:#fff;border-color:var(--t1);}
.btn.primary:hover{background:#333;}

/* ── COLOUR THEMES ── */
.t-green.status-pill{background:var(--g-bg);color:var(--g-mid);}
.t-green.delta-chip {background:var(--g-bg);color:var(--g-hi);}
.t-green.ins-tile   {background:var(--g-bg);}
.t-green .ins-top   {color:var(--g-mid);}
.t-green .ins-val   {color:var(--g-hi);}
.t-green .ins-sub   {color:var(--g-mid);}
.t-green.att-pct    {color:var(--g-mid);}
.t-green.track-fill {background:var(--g-bar);}

.t-red.status-pill  {background:var(--r-bg);color:var(--r-mid);}
.t-red.delta-chip   {background:var(--r-bg);color:var(--r-hi);}
.t-red.ins-tile     {background:var(--r-bg);}
.t-red .ins-top     {color:var(--r-mid);}
.t-red .ins-val     {color:var(--r-hi);}
.t-red .ins-sub     {color:var(--r-mid);}
.t-red.att-pct      {color:var(--r-mid);}
.t-red.track-fill   {background:var(--r-bar);}

.t-amber.status-pill{background:var(--a-bg);color:var(--a-mid);}
.t-amber.delta-chip {background:var(--a-bg);color:var(--a-hi);}
.t-amber.ins-tile   {background:var(--a-bg);}
.t-amber .ins-top   {color:var(--a-mid);}
.t-amber .ins-val   {color:var(--a-hi);}
.t-amber .ins-sub   {color:var(--a-mid);}
.t-amber.att-pct    {color:var(--a-mid);}
.t-amber.track-fill {background:var(--a-bar);}

.t-gray.status-pill {background:var(--surf);color:var(--t2);}
.t-gray.delta-chip  {background:var(--surf);color:var(--t2);}
.t-gray.ins-tile    {background:var(--surf);}
.t-gray .ins-top    {color:var(--t2);}
.t-gray .ins-val    {color:var(--t1);}
.t-gray .ins-sub    {color:var(--t3);}
.t-gray.att-pct     {color:var(--t2);}
.t-gray.track-fill  {background:var(--t3);}
</style>
</head>
<body>
<div id="app">

  <!-- CARD -->
  <div id="card">
    <div class="hdr">
      <div class="hdr-left">
        <span class="metric-name" id="metric-name">KPI Metric</span>
        <!-- pencil edit button -->
        <button class="edit-btn" id="edit-btn" title="Set card title" aria-label="Edit card title">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M8.5 1.5 L10.5 3.5 L4 10 L1.5 10.5 L2 8 Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="hdr-right">
        <div class="status-pill t-gray" id="status-pill">—</div>
      </div>
    </div>

    <div class="hero-val" id="hero-val">—</div>
    <div class="hero-sub">
      <div class="delta-chip t-gray" id="delta-chip">
        <svg id="delta-svg" width="10" height="10" viewBox="0 0 10 10" fill="none"></svg>
        <span id="delta-txt">—</span>
      </div>
      <span class="vs-text" id="vs-txt"></span>
    </div>

    <div class="div"></div>

    <div class="insight-row">
      <div class="ins-tile t-gray" id="var-tile">
        <div class="ins-top">
          <svg id="var-svg" width="11" height="11" viewBox="0 0 11 11" fill="none"></svg>
          <span>Variance</span>
        </div>
        <div class="ins-val" id="var-val">—</div>
        <div class="ins-sub" id="var-sub"></div>
      </div>
      <div class="ins-tile t-gray" id="bud-tile">
        <div class="ins-top">
          <svg id="bud-svg" width="11" height="11" viewBox="0 0 11 11" fill="none"></svg>
          <span>vs Budget</span>
        </div>
        <div class="ins-val" id="bud-val">—</div>
        <div class="ins-sub" id="bud-sub"></div>
      </div>
    </div>

    <div class="attain" id="attain" style="display:none">
      <div class="att-hdr">
        <span class="att-lbl">Budget attainment</span>
        <span class="att-pct t-gray" id="att-pct">—</span>
      </div>
      <div class="track"><div class="track-fill t-gray" id="track-fill" style="width:0%"></div></div>
      <div class="att-foot"><span>0</span><span id="att-target">—</span></div>
    </div>
  </div>

  <!-- SETTINGS POPOVER -->
  <div id="settings-overlay">
    <div class="settings-box">
      <h4>Card title</h4>
      <input type="text" id="title-input" placeholder="e.g. Total Revenue" maxlength="60"/>
      <div class="settings-actions">
        <button class="btn" id="cancel-btn">Cancel</button>
        <button class="btn primary" id="save-btn">Save</button>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';
(function(){

  var $=function(id){return document.getElementById(id);};
  var SETTING_KEY='kpi_card_title';

  /* ── number formatting ── */
  function fmt(n){
    if(n===null||isNaN(n)) return '—';
    var abs=Math.abs(n),s=n<0?'-':'';
    if(abs>=1e9)  return s+(abs/1e9).toFixed(2)+'B';
    if(abs>=1e6)  return s+(abs/1e6).toFixed(2)+'M';
    if(abs>=1000) return s+Math.round(abs).toLocaleString('en-US');
    return s+abs.toFixed(0);
  }
  function pct(n){return (n>=0?'+':'')+n.toFixed(1)+'%';}
  function abp(n){return Math.abs(n).toFixed(1)+'%';}

  /* ── colour helpers ── */
  function varClr(d){return d>=0?'t-green':'t-red';}
  function budClr(a,b){
    if(!b) return 't-gray';
    var p=(a/b)*100;
    return p>=100?'t-green':p>=90?'t-amber':'t-red';
  }
  var CLS=['t-green','t-red','t-amber','t-gray'];
  function clr(id,c){var e=$(id);CLS.forEach(function(x){e.classList.remove(x);});e.classList.add(c);}

  /* ── arrow SVG ── */
  function arw(up,sz){
    var h=sz-1,m=sz/2;
    var pts=up?'1,'+h+' '+m+',1 '+h+','+h:'1,1 '+m+','+h+' '+h+',1';
    return '<polyline points="'+pts+'" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
  }

  /* ── clean field name ── */
  function pretty(n){
    return n.replace(/^(SUM|AVG|MIN|MAX|COUNT|ATTR)\((.+)\)$/i,'$2')
            .replace(/[_-]/g,' ')
            .replace(/\b\w/g,function(c){return c.toUpperCase();}).trim();
  }

  /* ── data reading (confirmed working pattern) ── */
  async function getData(ws){
    var rows=[],reader=await ws.getSummaryDataReaderAsync(undefined,{ignoreSelection:true});
    for(var i=0;i<reader.pageCount;i++){
      var pg=await reader.getPageAsync(i);
      pg.data.forEach(function(r){
        var row={};
        pg.columns.forEach(function(c,idx){row[c.fieldName]=r[idx];});
        rows.push(row);
      });
    }
    await reader.releaseAsync();
    return rows;
  }

  async function getEnc(ws){
    var spec=await ws.getVisualSpecificationAsync(),map={};
    if(spec.activeMarksSpecificationIndex<0) return map;
    var marks=spec.marksSpecifications[spec.activeMarksSpecificationIndex];
    marks.encodings.forEach(function(e){map[e.id]=e.field;});
    return map;
  }

  /* ── render ── */
  function render(data,enc,savedTitle){
    if(!enc.actual||!data.length) return;
    var row=data[0];

    function dv(id){return enc[id]?row[enc[id].name]||null:null;}
    function num(id){
      var d=dv(id);if(!d) return null;
      var n=parseFloat(d.nativeValue!==undefined?d.nativeValue:d.value);
      return isNaN(n)?null:n;
    }
    function fmtd(id){
      var d=dv(id);if(!d) return null;
      var f=d.formattedValue;
      return(f&&f!=='%null%'&&f!=='Null')?f:fmt(num(id));
    }
    function str(id){
      var d=dv(id);if(!d) return null;
      var f=d.formattedValue;
      return(f&&f!=='%null%'&&f!=='Null')?f:null;
    }

    var aN=num('actual'), aF=fmtd('actual');
    var pN=num('previous');
    var bN=num('budget'),  bF=fmtd('budget');

    if(aN===null) return;

    /* ── header: priority = savedTitle > header encoding > field name ── */
    var headerText = savedTitle
      || str('header')
      || pretty(enc.actual.name);
    $('metric-name').textContent=headerText;
    /* pre-fill the input with current title for next edit */
    $('title-input').value=savedTitle||str('header')||'';

    /* deltas */
    var mD=(pN!==null)?aN-pN:null;
    var mP=(mD!==null&&pN!==0)?(mD/Math.abs(pN))*100:null;
    var aP=(bN!==null&&bN!==0)?(aN/bN)*100:null;
    var bP=aP!==null?aP-100:null;

    var vC=mD!==null?varClr(mD):'t-gray';
    var bC=bN!==null?budClr(aN,bN):'t-gray';
    var oC=bN!==null?bC:vC;
    var sMap={'t-green':'On Track','t-amber':'Near Target','t-red':'Off Track','t-gray':'—'};

    clr('status-pill',oC);
    $('status-pill').textContent=sMap[oC];

    /* hero */
    $('hero-val').textContent=aF||fmt(aN);

    /* delta chip */
    clr('delta-chip',vC);
    if(mD!==null){
      var up=mD>=0;
      $('delta-svg').innerHTML=arw(up,10);
      $('delta-txt').textContent=(up?'+':'')+fmt(mD)+'  '+(up?'+':'')+mP.toFixed(1)+'%';
      $('vs-txt').textContent='vs '+(enc.previous?pretty(enc.previous.name):'last month');
    } else {
      $('delta-svg').innerHTML='';
      $('delta-txt').textContent='No prior data';
      $('vs-txt').textContent='';
    }

    /* variance tile */
    clr('var-tile',vC);
    $('var-svg').innerHTML=mD!==null?arw(mD>=0,11):'';
    $('var-val').textContent=mD!==null?(mD>=0?'+':'')+fmt(mD):'—';
    $('var-sub').textContent=mP!==null
      ?(mD>=0?'▲ ':'▼ ')+abp(mP)+' vs '+(enc.previous?pretty(enc.previous.name):'last month')
      :'Add Previous Month field';

    /* budget tile */
    clr('bud-tile',bC);
    $('bud-svg').innerHTML=bN!==null?arw(aN>=bN,11):'';
    $('bud-val').textContent=bF||fmt(bN)||'—';
    $('bud-sub').textContent=bP!==null
      ?(bP>=0?'▲ ':'▼ ')+abp(bP)+' '+(bP>=0?'above':'below')+' target'
      :'Add Budget / Target field';

    /* attainment bar */
    if(aP!==null){
      $('attain').style.display='';
      clr('att-pct',bC); clr('track-fill',bC);
      $('att-pct').textContent=Math.round(aP)+'%';
      $('track-fill').style.width=Math.min(Math.max(aP,0),100)+'%';
      $('att-target').textContent='Target '+(bF||fmt(bN));
    } else {
      $('attain').style.display='none';
    }
  }

  /* ── init ── */
  window.onload=tableau.extensions.initializeAsync().then(function(){
    var ws=tableau.extensions.worksheetContent.worksheet;

    /* load saved title from extension settings */
    var savedTitle=tableau.extensions.settings.get(SETTING_KEY)||'';

    var update=async function(){
      var data=await getData(ws);
      var enc =await getEnc(ws);
      render(data,enc,savedTitle);
    };

    ws.addEventListener(tableau.TableauEventType.SummaryDataChanged,update);
    update();

    /* ── settings popover ── */
    $('edit-btn').addEventListener('click',function(){
      $('settings-overlay').classList.add('open');
      $('title-input').focus();
      $('title-input').select();
    });

    function closePopover(){$('settings-overlay').classList.remove('open');}

    $('cancel-btn').addEventListener('click',closePopover);

    $('save-btn').addEventListener('click',async function(){
      savedTitle=$('title-input').value.trim();
      tableau.extensions.settings.set(SETTING_KEY,savedTitle);
      await tableau.extensions.settings.saveAsync();
      closePopover();
      update();
    });

    /* close on overlay background click */
    $('settings-overlay').addEventListener('click',function(e){
      if(e.target===this) closePopover();
    });

    /* save on Enter key */
    $('title-input').addEventListener('keydown',function(e){
      if(e.key==='Enter') $('save-btn').click();
      if(e.key==='Escape') closePopover();
    });
  });

})();
</script>
</body>
</html>
