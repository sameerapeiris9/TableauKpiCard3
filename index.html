<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Modern KPI Card</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://unpkg.com/@tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:#f5f7fb;
    padding:24px;
}

.card{
    width:100%;
    background:white;
    border-radius:32px;
    padding:28px;
    box-shadow:
        0 10px 40px rgba(15,23,42,.05),
        0 2px 10px rgba(15,23,42,.04);
    border:1px solid #edf2f7;
}

/* ===========================
HEADER
=========================== */

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
}

.left-head{
    display:flex;
    gap:18px;
    align-items:flex-start;
}

.icon-box{
    width:64px;
    height:64px;
    border-radius:20px;
    background:linear-gradient(135deg,#ede9fe,#f5f3ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
}

.title{
    font-size:18px;
    font-weight:700;
    color:#0f172a;
}

.subtitle{
    margin-top:6px;
    color:#64748b;
    font-size:14px;
}

/* ===========================
MAIN KPI
=========================== */

.hero{
    display:flex;
    justify-content:space-between;
    gap:24px;
    margin-bottom:28px;
}

.hero-left{
    flex:1;
}

.hero-value{
    font-size:72px;
    line-height:1;
    font-weight:800;
    color:#0b132b;
    letter-spacing:-2px;
}

.hero-label{
    margin-top:12px;
    color:#64748b;
    font-size:16px;
    font-weight:600;
}

.hero-month{
    margin-top:8px;
    color:#6d28d9;
    font-weight:700;
    font-size:30px;
}

.compare-wrap{
    display:flex;
    gap:18px;
}

.compare-card{
    width:230px;
    border-radius:26px;
    padding:24px;
    background:#fbfcff;
    border:1px solid #e2e8f0;
}

.compare-title{
    font-size:14px;
    color:#64748b;
    font-weight:700;
    margin-bottom:18px;
}

.compare-value{
    font-size:42px;
    font-weight:800;
}

.green{
    color:#16a34a;
}

.red{
    color:#dc2626;
}

.compare-sub{
    margin-top:12px;
    color:#64748b;
    font-size:14px;
}

/* ===========================
ACHIEVEMENT
=========================== */

.achievement{
    margin-bottom:28px;
    border-radius:26px;
    padding:24px 28px;
    background:linear-gradient(90deg,#effdf5,#f8fffb);
    border:1px solid #d1fae5;

    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:24px;
}

.ach-left{
    display:flex;
    gap:18px;
    align-items:center;
}

.check{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#22c55e;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:700;
}

.ach-title{
    font-size:18px;
    font-weight:700;
    color:#15803d;
}

.ach-sub{
    margin-top:6px;
    color:#475569;
}

.progress-wrap{
    width:420px;
}

.progress-top{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

.progress-val{
    font-size:18px;
    font-weight:800;
    color:#16a34a;
}

.progress{
    height:12px;
    border-radius:999px;
    background:#e2e8f0;
    overflow:hidden;
    position:relative;
}

.progress-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#22c55e,#86efac);
}

/* ===========================
TREND
=========================== */

.chart-card{
    background:white;
    border-radius:28px;
    border:1px solid #e2e8f0;
    padding:24px;
}

.chart-title{
    font-size:18px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:22px;
}

canvas{
    width:100% !important;
    height:360px !important;
}

/* ===========================
INSIGHT
=========================== */

.insight{
    margin-top:22px;
    border-radius:20px;
    padding:18px;
    background:#f8fafc;
    color:#1e40af;
    text-align:center;
    font-size:16px;
}

</style>
</head>

<body>

<div class="card">

    <div class="header">

        <div class="left-head">

            <div class="icon-box">
                📈
            </div>

            <div>
                <div class="title">KPI Performance</div>
                <div class="subtitle" id="latestInfo">
                    Latest Available Month
                </div>
            </div>

        </div>

    </div>

    <!-- HERO -->

    <div class="hero">

        <div class="hero-left">

            <div class="hero-value" id="heroValue">
                0
            </div>

            <div class="hero-label">
                LATEST MONTH VALUE
            </div>

            <div class="hero-month" id="heroMonth">
                -
            </div>

        </div>

        <div class="compare-wrap">

            <div class="compare-card">

                <div class="compare-title">
                    VS LAST MONTH
                </div>

                <div class="compare-value" id="momValue">
                    -
                </div>

                <div class="compare-sub" id="momSub">
                    -
                </div>

            </div>

            <div class="compare-card">

                <div class="compare-title">
                    VS LAST YEAR END
                </div>

                <div class="compare-value" id="yoyValue">
                    -
                </div>

                <div class="compare-sub" id="yoySub">
                    -
                </div>

            </div>

        </div>

    </div>

    <!-- ACHIEVEMENT -->

    <div class="achievement">

        <div class="ach-left">

            <div class="check">
                ✓
            </div>

            <div>

                <div class="ach-title" id="achTitle">
                    Budget Achieved
                </div>

                <div class="ach-sub" id="achSub">
                    Actual vs Budget
                </div>

            </div>

        </div>

        <div class="progress-wrap">

            <div class="progress-top">
                <div class="progress-val" id="progressVal">
                    0%
                </div>
            </div>

            <div class="progress">
                <div class="progress-fill" id="progressFill"></div>
            </div>

        </div>

    </div>

    <!-- TREND -->

    <div class="chart-card">

        <div class="chart-title">
            Trend Overview
        </div>

        <canvas id="trendChart"></canvas>

        <div class="insight" id="insight">
            Loading insight...
        </div>

    </div>

</div>

<script>

let chart;

async function init(){

    await tableau.extensions.initializeAsync();

    const worksheet =
        tableau.extensions.dashboardContent.dashboard.worksheets[0];

    const data =
        await worksheet.getSummaryDataAsync();

    processData(data);
}

function processData(data){

    const columns = data.columns.map(c => c.fieldName);

    const actualIndex = columns.findIndex(c =>
        c.toLowerCase().includes("actual"));

    const budgetIndex = columns.findIndex(c =>
        c.toLowerCase().includes("budget"));

    const dateIndex = columns.findIndex(c =>
        c.toLowerCase().includes("date") ||
        c.toLowerCase().includes("month"));

    const rows = data.data.map(r => ({
        actual: Number(r[actualIndex]?.value || 0),
        budget: Number(r[budgetIndex]?.value || 0),
        date: new Date(r[dateIndex]?.value)
    }));

    rows.sort((a,b)=>a.date-b.date);

    const latest = rows[rows.length-1];
    const previous = rows[rows.length-2] || latest;

    const lastYearEnd =
        rows.find(r =>
            r.date.getMonth()===11 &&
            r.date.getFullYear()===latest.date.getFullYear()-1
        ) || previous;

    // =========================
    // HERO
    // =========================

    document.getElementById("heroValue").innerHTML =
        latest.actual.toLocaleString();

    document.getElementById("heroMonth").innerHTML =
        latest.date.toLocaleString("default",
        {month:"long",year:"numeric"});

    document.getElementById("latestInfo").innerHTML =
        `As of ${latest.date.toLocaleString("default",
        {month:"long",year:"numeric"})} (Latest Available)`;


    // =========================
    // MOM
    // =========================

    const mom =
        ((latest.actual-previous.actual)/previous.actual)*100;

    const momEl =
        document.getElementById("momValue");

    momEl.innerHTML =
        `${mom>=0?'↑':'↓'} ${Math.abs(mom).toFixed(1)}%`;

    momEl.className =
        `compare-value ${mom>=0?'green':'red'}`;

    document.getElementById("momSub").innerHTML =
        previous.actual.toLocaleString();


    // =========================
    // YOY
    // =========================

    const yoy =
        ((latest.actual-lastYearEnd.actual)/
        lastYearEnd.actual)*100;

    const yoyEl =
        document.getElementById("yoyValue");

    yoyEl.innerHTML =
        `${yoy>=0?'↑':'↓'} ${Math.abs(yoy).toFixed(1)}%`;

    yoyEl.className =
        `compare-value ${yoy>=0?'green':'red'}`;

    document.getElementById("yoySub").innerHTML =
        lastYearEnd.actual.toLocaleString();


    // =========================
    // ACHIEVEMENT
    // =========================

    const achievement =
        (latest.actual/latest.budget)*100;

    document.getElementById("progressVal").innerHTML =
        achievement.toFixed(1)+"%";

    document.getElementById("progressFill").style.width =
        Math.min(achievement,120)+"%";

    document.getElementById("achTitle").innerHTML =
        achievement>=100
        ? "Budget achieved successfully!"
        : "Budget target not achieved";

    document.getElementById("achSub").innerHTML =
        `Actual is ${achievement.toFixed(1)}% of Budget`;

    // =========================
    // INSIGHT
    // =========================

    const exceeded =
        rows.filter(r => r.actual >= r.budget).length;

    document.getElementById("insight").innerHTML =
        `Actual exceeded budget in ${exceeded}
        of ${rows.length} months.`;


    // =========================
    // CHART
    // =========================

    const ctx =
        document.getElementById("trendChart")
        .getContext("2d");

    const gradient =
        ctx.createLinearGradient(0,0,0,400);

    gradient.addColorStop(0,
        "rgba(109,40,217,0.35)");

    gradient.addColorStop(1,
        "rgba(109,40,217,0)");

    chart = new Chart(ctx, {

        type:"line",

        data:{
            labels: rows.map(r =>
                r.date.toLocaleString("default",
                {month:"short",year:"numeric"})),

            datasets:[

                {
                    label:"Actual",
                    data: rows.map(r=>r.actual),
                    borderColor:"#6d28d9",
                    backgroundColor:gradient,
                    fill:true,
                    tension:.45,
                    pointRadius:5,
                    pointHoverRadius:8
                },

                {
                    label:"Budget",
                    data: rows.map(r=>r.budget),
                    borderColor:"#3b82f6",
                    borderDash:[6,6],
                    tension:.45,
                    pointRadius:4
                }

            ]
        },

        options:{

            responsive:true,

            plugins:{
                legend:{
                    position:"top"
                },

                tooltip:{
                    backgroundColor:"#0f172a",
                    padding:14,
                    cornerRadius:14,

                    callbacks:{
                        label:function(context){
                            return context.dataset.label
                            + ": "
                            + context.parsed.y.toLocaleString();
                        }
                    }
                }
            },

            scales:{
                x:{
                    grid:{
                        display:false
                    }
                },

                y:{
                    grid:{
                        color:"#e2e8f0"
                    }
                }
            }
        }
    });

}

init();

</script>

</body>
</html>
