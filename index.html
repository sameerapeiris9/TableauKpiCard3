<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://tableau.github.io/extensions-api/lib/tableau.extensions.1.latest.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:#f4f7fb;
    padding:20px;
}

.card{
    width:100%;
    border-radius:32px;
    background:white;
    padding:34px;
    box-shadow:
        0 10px 40px rgba(15,23,42,0.06);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.left{
    display:flex;
    gap:20px;
}

.icon{
    width:76px;
    height:76px;
    border-radius:24px;
    background:linear-gradient(135deg,#eef2ff,#f3e8ff);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
}

.title{
    font-size:20px;
    font-weight:700;
    color:#0f172a;
}

.subtitle{
    margin-top:8px;
    color:#64748b;
    font-size:15px;
}

.hero{
    margin-top:28px;
    font-size:78px;
    font-weight:800;
    color:#020617;
}

.hero-label{
    color:#64748b;
    margin-top:6px;
    letter-spacing:1px;
    font-size:15px;
}

.stats{
    display:flex;
    gap:18px;
}

.stat-box{
    width:240px;
    border-radius:28px;
    padding:28px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
}

.stat-title{
    color:#64748b;
    font-size:14px;
    font-weight:700;
}

.stat-value{
    margin-top:26px;
    font-size:42px;
    font-weight:800;
}

.stat-sub{
    margin-top:8px;
    color:#64748b;
}

.green{
    color:#16a34a;
}

.red{
    color:#dc2626;
}

.insight{
    margin-top:28px;
    border-radius:28px;
    padding:28px;
    background:linear-gradient(90deg,#ecfdf5,#f0fdf4);
    border:1px solid #bbf7d0;
}

.insight-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.insight-title{
    font-size:18px;
    font-weight:700;
    color:#166534;
}

.progress{
    margin-top:20px;
    height:16px;
    border-radius:999px;
    background:#dcfce7;
    overflow:hidden;
}

.bar{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#22c55e,#86efac);
}

.chart-card{
    margin-top:28px;
    background:white;
    border-radius:28px;
    border:1px solid #e2e8f0;
    padding:24px;
}

.chart-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}

canvas{
    height:320px !important;
}

</style>
</head>

<body>

<div class="card">

    <div class="top">

        <div>
            <div class="left">

                <div class="icon">
                    📈
                </div>

                <div>
                    <div class="title">
                        KPI Performance
                    </div>

                    <div class="subtitle" id="monthText">
                        Latest Available Month
                    </div>
                </div>

            </div>

            <div class="hero" id="heroValue">
                -
            </div>

            <div class="hero-label">
                LATEST MONTH VALUE
            </div>
        </div>

        <div class="stats">

            <div class="stat-box">
                <div class="stat-title">
                    VS LAST MONTH
                </div>

                <div class="stat-value" id="momValue">
                    -
                </div>

                <div class="stat-sub" id="momSub">
                    -
                </div>
            </div>

            <div class="stat-box">
                <div class="stat-title">
                    VS LAST YEAR END
                </div>

                <div class="stat-value" id="yoyValue">
                    -
                </div>

                <div class="stat-sub" id="yoySub">
                    -
                </div>
            </div>

        </div>

    </div>

    <div class="insight">

        <div class="insight-top">

            <div>
                <div class="insight-title" id="insightTitle">
                    Budget Achievement
                </div>

                <div style="margin-top:6px;color:#64748b">
                    Actual vs Budget
                </div>
            </div>

            <div style="font-size:38px;font-weight:800;color:#16a34a" id="achievePct">
                0%
            </div>

        </div>

        <div class="progress">
            <div class="bar" id="progressBar"></div>
        </div>

    </div>

    <div class="chart-card">

        <div class="chart-title">
            Trend Overview
        </div>

        <canvas id="trendChart"></canvas>

    </div>

</div>

<script>

let chart;

tableau.extensions.initializeAsync().then(async()=>{

    const worksheet =
        tableau.extensions.dashboardContent.dashboard.worksheets[0];

    const data =
        await worksheet.getSummaryDataAsync();

    const columns = data.columns;
    const rows = data.data;

    const actualIndex =
        columns.findIndex(c =>
            c.fieldName.toLowerCase().includes('actual'));

    const budgetIndex =
        columns.findIndex(c =>
            c.fieldName.toLowerCase().includes('budget'));

    const dateIndex =
        columns.findIndex(c =>
            c.fieldName.toLowerCase().includes('date'));

    if(actualIndex===-1 || budgetIndex===-1 || dateIndex===-1){
        alert("Actual/Budget/Date fields not found");
        return;
    }

    const parsed = rows.map(r=>({

        actual:
            Number(r[actualIndex].value),

        budget:
            Number(r[budgetIndex].value),

        date:
            new Date(r[dateIndex].value)

    }))
    .filter(d=>!isNaN(d.actual));

    parsed.sort((a,b)=>a.date-b.date);

    const latest =
        parsed[parsed.length-1];

    const previous =
        parsed[parsed.length-2] || latest;

    const latestActual =
        latest.actual;

    const latestBudget =
        latest.budget;

    const latestMonth =
        latest.date.toLocaleString('default',{
            month:'long',
            year:'numeric'
        });

    document.getElementById('monthText').innerText =
        latestMonth;

    document.getElementById('heroValue').innerText =
        latestActual.toLocaleString();

    const mom =
        ((latestActual-previous.actual)
        /previous.actual)*100;

    const momArrow =
        mom>=0 ? '▲':'▼';

    document.getElementById('momValue').innerHTML =
        `${momArrow} ${Math.abs(mom).toFixed(1)}%`;

    document.getElementById('momValue').className =
        `stat-value ${mom>=0?'green':'red'}`;

    document.getElementById('momSub').innerText =
        'Month over Month';

    const budgetPct =
        (latestActual/latestBudget)*100;

    document.getElementById('achievePct').innerText =
        `${budgetPct.toFixed(0)}%`;

    document.getElementById('progressBar').style.width =
        `${Math.min(budgetPct,100)}%`;

    document.getElementById('insightTitle').innerText =
        budgetPct>=100
        ? 'Budget Achieved Successfully'
        : 'Budget Below Target';

    const labels =
        parsed.map(d=>
            d.date.toLocaleString('default',{
                month:'short'
            }));

    const actuals =
        parsed.map(d=>d.actual);

    const ctx =
        document.getElementById('trendChart');

    const gradient =
        ctx.getContext('2d')
        .createLinearGradient(0,0,0,320);

    gradient.addColorStop(0,'rgba(59,130,246,0.45)');
    gradient.addColorStop(1,'rgba(59,130,246,0.02)');

    chart = new Chart(ctx,{

        type:'line',

        data:{
            labels:labels,

            datasets:[{
                label:'Actual',

                data:actuals,

                borderColor:'#2563eb',

                backgroundColor:gradient,

                fill:true,

                tension:0.4,

                pointRadius:5,

                pointHoverRadius:8
            }]
        },

        options:{

            responsive:true,

            plugins:{
                legend:{
                    display:false
                },

                tooltip:{
                    enabled:true,
                    backgroundColor:'#0f172a',
                    padding:14,
                    cornerRadius:12
                }
            },

            scales:{

                x:{
                    grid:{
                        display:false
                    }
                },

                y:{
                    grid:{
                        color:'#e2e8f0'
                    }
                }
            }
        }
    });

});

</script>

</body>
</html>
