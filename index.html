<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KPI Card</title>
<script src="../../lib/tableau.extensions.1.latest.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --page:#f5f5f2;
  --card:#ffffff;
  --bdr:rgba(0,0,0,0.07);
  --t1:#111827;
  --t2:#6b7280;
  --t3:#9ca3af;
  --up:#3b6d11;   --up-bg:#eaf3de;
  --dn:#a32d2d;   --dn-bg:#fcebeb;
  --neu:#374151;  --neu-bg:#f3f4f6;
  --green:#639922;
  --font:'Inter',-apple-system,sans-serif;
}

html,body{
  width:100%;height:100%;margin:0;
  background:var(--page);
  font-family:var(--font);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* STATES */
#state-ph,#state-err,#state-card{width:calc(100% - 24px);max-width:420px}

#state-ph,#state-err{
  display:flex;flex-direction:column;align-items:center;
  gap:10px;color:var(--t3);font-size:12px;
  text-align:center;padding:32px;line-height:1.6;
}
#state-ph svg,#state-err svg{opacity:.4;margin-bottom:4px}
#state-ph strong,#state-err strong{font-size:13px;font-weight:500;color:var(--t2)}
#state-err{display:none}
#err-msg{
  font-size:10.5px;color:var(--dn);background:var(--dn-bg);
  padding:8px 12px;border-radius:6px;
  word-break:break-word;text-align:left;width:100%;
  line-height:1.6;
}

/* CARD */
#state-card{
  display:none;
  background:var(--card);
  border-radius:14px;
  border:0.5px solid var(--bdr);
  padding:20px 22px 18px;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 6px 20px rgba(0,0,0,.07);
  animation:up .3s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* HEADER */
.hd-label{font-size:10.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--t2);margin-bottom:2px}
.hd-period{font-size:10px;color:var(--t3)}

/* HERO */
.hero{display:flex;align-items:flex-end;justify-content:space-between;margin:10px 0 2px}
.hero-val{font-size:36px;font-weight:500;color:var(--t1);letter-spacing:-0.025em;line-height:1}
.var-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap;margin-bottom:2px}
.var-pill.up{background:var(--up-bg);color:var(--up)}
.var-pill.dn{background:var(--dn-bg);color:var(--dn)}
.var-pill.neu{background:var(--neu-bg);color:var(--neu)}
.hero-sub{font-size:10px;color:var(--t3);margin-bottom:12px;min-height:14px}

/* DIVIDER */
.hr{height:.5px;background:var(--bdr);margin:11px 0}

/* COMPARISON ROWS */
.comp{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px}
.comp:last-child{margin-bottom:0}
.comp-lbl{font-size:10.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.badges{display:flex;gap:4px;flex-shrink:0}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;white-space:nowrap}
.badge.up{background:var(--up-bg);color:var(--up)}
.badge.dn{background:var(--dn-bg);color:var(--dn)}
.badge.neu{background:var(--neu-bg);color:var(--neu)}

/* SPARKLINE */
.spark-wrap{position:relative}
#spark{width:100%;display:block;overflow:visible}
.spark-axis{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:2px}

/* BUDGET */
.budget-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:.5px solid var(--bdr)}
.budget-lbl{font-size:10.5px;color:var(--t2)}
.budget-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:5px;white-space:nowrap}
.budget-tag.up{background:var(--up-bg);color:var(--up)}
.budget-tag.dn{background:var(--dn-bg);color:var(--dn)}

/* TOOLTIP */
#tip{position:fixed;background:rgba(17,24,39,.88);color:#fff;font-size:10px;font-family:var(--font);padding:4px 9px;border-radius:5px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .12s;z-index:9999}
</style>
</head>
<body>

<!-- Placeholder -->
<div id="state-ph">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <rect x="2" y="2" width="36" height="36" rx="8" stroke="#9ca3af" stroke-width="1.5"/>
    <path d="M8 28 L14 20 L20 23 L27 13 L32 16" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="16" r="2" fill="#9ca3af"/>
  </svg>
  <strong>KPI Card</strong>
  <span>Drop fields on the Marks card tiles:<br>
    <b style="color:#6b7280">Actual Value · Previous Period</b><br>
    <b style="color:#6b7280">Budget/Target · Trend (Sparkline)</b>
  </span>
  <span style="font-size:10px;color:#9ca3af;margin-top:2px">Add a date to Detail for the sparkline axis</span>
</div>

<!-- Error -->
<div id="state-err">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="16" stroke="#f0959 5" stroke-width="1.5"/>
    <path d="M18 10 L18 19" stroke="#f09595" stroke-width="2" stroke-linecap="round"/>
    <circle cx="18" cy="24" r="1.5" fill="#f09595"/>
  </svg>
  <strong>Something went wrong</strong>
  <div id="err-msg"></div>
</div>

<!-- Card -->
<div id="state-card">
  <div class="hd-label" id="hd-label">KPI Metric</div>
  <div class="hd-period" id="hd-period"></div>

  <div class="hero">
    <div class="hero-val" id="hero-val">—</div>
    <div class="var-pill neu" id="var-pill" style="display:none">—</div>
  </div>
  <div class="hero-sub" id="hero-sub"></div>

  <div class="hr" id="hr-comps" style="display:none"></div>
  <div id="comps-block" style="display:none">
    <div class="comp" id="row-mom" style="display:none">
      <span class="comp-lbl" id="mom-lbl">vs Previous Period</span>
      <div class="badges">
        <span class="badge neu" id="mom-pct">—</span>
        <span class="badge neu" id="mom-abs">—</span>
      </div>
    </div>
    <div class="comp" id="row-yoy" style="display:none">
      <span class="comp-lbl" id="yoy-lbl">vs Last Year</span>
      <div class="badges">
        <span class="badge neu" id="yoy-pct">—</span>
        <span class="badge neu" id="yoy-abs">—</span>
      </div>
    </div>
  </div>

  <div class="hr" id="hr-spark" style="display:none"></div>
  <div class="spark-wrap" id="spark-block" style="display:none">
    <svg id="spark" height="56"></svg>
    <div class="spark-axis" id="spark-axis"></div>
  </div>

  <div class="budget-row" id="budget-row" style="display:none">
    <span class="budget-lbl" id="budget-lbl">vs Budget</span>
    <span class="budget-tag" id="budget-tag">—</span>
  </div>
</div>

<div id="tip"></div>

<script>
'use strict';
(function () {

  /* ── DOM refs ─────────────────────────────────── */
  var $ = function(id){ return document.getElementById(id); };
  var NS = 'http://www.w3.org/2000/svg';

  /* ── State helpers ────────────────────────────── */
  function showState(name, errText) {
    $('state-ph').style.display  = name === 'ph'   ? '' : 'none';
    $('state-err').style.display = name === 'err'  ? '' : 'none';
    $('state-card').style.display= name === 'card' ? '' : 'none';
    if (name === 'err' && errText) $('err-msg').textContent = errText;
  }

  /* ── Tooltip ──────────────────────────────────── */
  var tip = $('tip');
  function showTip(e, t) { tip.textContent = t; tip.style.opacity = '1'; moveTip(e); }
  function moveTip(e)    { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 30) + 'px'; }
  function hideTip()     { tip.style.opacity = '0'; }

  /* ── Number formatting ────────────────────────── */
  function fmtN(n, cur) {
    if (n === null || isNaN(n)) return '—';
    cur = (cur === undefined) ? true : cur;
    var p = cur ? '$' : '';
    var abs = Math.abs(n), s = n < 0 ? '-' : '';
    if (abs >= 1e9)  return s + p + (abs / 1e9).toFixed(2) + 'B';
    if (abs >= 1e6)  return s + p + (abs / 1e6).toFixed(2) + 'M';
    if (abs >= 1000) return s + p + Math.round(abs).toLocaleString('en-US');
    return s + p + abs.toFixed(abs < 10 ? 2 : 0);
  }
  function fmtPct(n) { return n === null ? '—' : Math.abs(n).toFixed(1) + '%'; }

  /* ── DataValue to number ──────────────────────── */
  function dvNum(dv) {
    if (!dv) return null;
    /* nativeValue is preferred — it's the raw number */
    var raw = (dv.nativeValue !== undefined && dv.nativeValue !== null)
              ? dv.nativeValue : dv.value;
    var n = parseFloat(raw);
    return isNaN(n) ? null : n;
  }

  /* ── DataValue to formatted string ───────────── */
  function dvFmt(dv) {
    if (!dv) return null;
    var f = dv.formattedValue;
    if (f && f !== '%null%' && f !== 'Null' && f !== 'null') return f;
    var n = dvNum(dv);
    return n !== null ? fmtN(n) : null;
  }

  /* ── DataValue to plain string ────────────────── */
  function dvStr(dv) {
    if (!dv) return null;
    var v = (dv.formattedValue !== undefined) ? dv.formattedValue : String(dv.value);
    return (v === '%null%' || v === 'Null' || v === 'null') ? null : v;
  }

  /* ── Clean field name for display ────────────── */
  function pretty(s) {
    if (!s) return '';
    return s.replace(/^(SUM|AVG|MIN|MAX|COUNT|ATTR)\((.+)\)$/i, '$2')
            .replace(/[_-]/g, ' ')
            .replace(/\b\w/g, function(c){ return c.toUpperCase(); })
            .trim();
  }

  /* ── Set a badge element ──────────────────────── */
  function setBadge(id, val, isAbs) {
    var el = $(id);
    if (val === null || val === undefined) {
      el.textContent = '—'; el.className = 'badge neu'; return;
    }
    var up = val >= 0;
    el.className = 'badge ' + (up ? 'up' : 'dn');
    el.textContent = isAbs
      ? (up ? '+' : '') + fmtN(val)
      : (up ? '▲ ' : '▼ ') + fmtPct(val);
  }

  /* ── SVG element helper ───────────────────────── */
  function svgEl(tag, attrs) {
    var el = document.createElementNS(NS, tag);
    Object.keys(attrs || {}).forEach(function(k){ el.setAttribute(k, attrs[k]); });
    return el;
  }

  /* ── Show/hide helpers ────────────────────────── */
  function show(id){ $(id).style.display = ''; }
  function hide(id){ $(id).style.display = 'none'; }

  /* =====================================================
     TABLEAU INIT
  ===================================================== */
  var ws = null;

  window.onload = function () {
    tableau.extensions.initializeAsync().then(function () {
      ws = tableau.extensions.worksheetContent.worksheet;
      ws.addEventListener(tableau.TableauEventType.SummaryDataChanged, refresh);
      refresh();
    }, function (err) {
      showState('err', 'Init failed: ' + String(err));
    });
  };

  /* =====================================================
     REFRESH
  ===================================================== */
  function refresh() {
    Promise.all([getEncodings(), getData()])
      .then(function(results){ render(results[0], results[1].cols, results[1].rows); })
      .catch(function(err){ showState('err', 'Data error: ' + String(err)); });
  }

  /* =====================================================
     GET ENCODING MAP
     Returns { encId: [fieldName, ...] }
  ===================================================== */
  function getEncodings() {
    return ws.getVisualSpecificationAsync().then(function(spec) {
      var marks = spec.marksSpecifications[spec.activeMarksSpecificationIndex];
      var map = {};
      marks.encodings.forEach(function(e) {
        if (!map[e.id]) map[e.id] = [];
        if (e.field && e.field.name) map[e.id].push(e.field.name);
      });
      return map;
    });
  }

  /* =====================================================
     GET SUMMARY DATA
     Reads all pages. Returns { cols, rows }.
     cols = [{name, idx}]
     rows = array of DataValue arrays
  ===================================================== */
  function getData() {
    return ws.getSummaryDataReaderAsync(undefined, { ignoreSelection: true })
      .then(function(reader) {
        var pages = [];
        var chain = Promise.resolve();
        for (var p = 0; p < reader.pageCount; p++) {
          (function(pageNum){
            chain = chain.then(function(){
              return reader.getPageAsync(pageNum).then(function(pg){ pages.push(pg); });
            });
          })(p);
        }
        return chain.then(function(){
          return reader.releaseAsync().then(function(){
            if (!pages.length) return { cols: [], rows: [] };
            var cols = pages[0].columns.map(function(c){ return { name: c.fieldName, idx: c.index }; });
            var rows = [];
            pages.forEach(function(pg){ pg.data.forEach(function(r){ rows.push(r); }); });
            return { cols: cols, rows: rows };
          });
        });
      });
  }

  /* =====================================================
     RENDER
  ===================================================== */
  function render(enc, cols, rows) {

    /* ── column lookup ── */
    function ci(name) {
      for (var i = 0; i < cols.length; i++) {
        if (cols[i].name === name) return cols[i].idx;
      }
      return -1;
    }
    function cell(row, name) { var i = ci(name); return i >= 0 ? row[i] : null; }

    /* ── first mapped field for an encoding ── */
    function firstField(encId) {
      var fields = enc[encId] || [];
      return fields.length ? fields[0] : null;
    }

    /* ── first value for an encoding ── */
    function firstVal(encId) {
      var f = firstField(encId);
      if (!f || !rows.length) return { v: null, fmt: null, field: null };
      var dv = cell(rows[0], f);
      return { v: dvNum(dv), fmt: dvFmt(dv), field: f };
    }

    /* ── extract values ── */
    var actual   = firstVal('actual');
    var previous = firstVal('previous');
    var budget   = firstVal('budget');

    /* trend: all rows of 'trend' field */
    var trendField = firstField('trend');
    var trendVals = [], trendLabels = [];
    if (trendField) {
      var tfi = ci(trendField);
      /* try Detail then Tooltip for axis labels */
      var dateField = (enc['detail'] || enc['tooltip'] || [])[0] || null;
      var dfi = dateField ? ci(dateField) : -1;
      if (tfi >= 0) {
        rows.forEach(function(r) {
          var n = dvNum(r[tfi]);
          if (n !== null) {
            trendVals.push(n);
            trendLabels.push(dfi >= 0 ? (dvStr(r[dfi]) || '') : '');
          }
        });
      }
    }

    /* guard: need at least actual value */
    if (actual.v === null && trendVals.length === 0) {
      showState('ph');
      return;
    }

    showState('card');

    /* ── HEADER ── */
    $('hd-label').textContent = actual.field ? pretty(actual.field) : 'KPI Metric';

    /* period label: last row of dateField, or last trendLabel */
    var periodLabel = '';
    if (trendLabels.length) periodLabel = trendLabels[trendLabels.length - 1];
    $('hd-period').textContent = periodLabel;

    /* ── HERO VALUE ── */
    $('hero-val').textContent = actual.fmt || fmtN(actual.v) || '—';

    /* ── MoM VARIANCE ── */
    var momDelta = null, momPct = null;
    if (actual.v !== null && previous.v !== null && previous.v !== 0) {
      momDelta = actual.v - previous.v;
      momPct   = (momDelta / Math.abs(previous.v)) * 100;
    }

    /* hero pill */
    var pill = $('var-pill');
    if (momDelta !== null) {
      var up = momDelta >= 0;
      pill.className = 'var-pill ' + (up ? 'up' : 'dn');
      pill.textContent = (up ? '▲ +' : '▼ ') + fmtN(momDelta) + ' vs prev';
      pill.style.display = '';
      $('hero-sub').textContent = previous.field
        ? 'vs ' + pretty(previous.field)
        : 'vs previous period';
    } else {
      pill.style.display = 'none';
      $('hero-sub').textContent = '';
    }

    /* ── COMPARISON ROWS ── */
    var showMom = momDelta !== null;
    $(  'row-mom').style.display = showMom ? '' : 'none';
    if (showMom) {
      $('mom-lbl').textContent = previous.field
        ? 'vs ' + pretty(previous.field) + ' (MoM)'
        : 'vs Previous Period (MoM)';
      setBadge('mom-pct', momPct,   false);
      setBadge('mom-abs', momDelta, true);
    }

    /* YoY: if trend has 13+ data points, compare latest vs 12 back */
    var showYoy = false, yoyDelta = null, yoyPct = null;
    if (trendVals.length >= 13) {
      var cur12  = trendVals[trendVals.length - 1];
      var prev12 = trendVals[trendVals.length - 13];
      if (prev12 !== 0) {
        yoyDelta = cur12 - prev12;
        yoyPct   = (yoyDelta / Math.abs(prev12)) * 100;
        showYoy  = true;
      }
    }
    $('row-yoy').style.display = showYoy ? '' : 'none';
    if (showYoy) {
      setBadge('yoy-pct', yoyPct,   false);
      setBadge('yoy-abs', yoyDelta, true);
    }

    var anyComp = showMom || showYoy;
    $('hr-comps').style.display    = anyComp ? '' : 'none';
    $('comps-block').style.display = anyComp ? '' : 'none';

    /* ── SPARKLINE ── */
    var showSpark = trendVals.length >= 2;
    $('hr-spark').style.display    = showSpark ? '' : 'none';
    $('spark-block').style.display = showSpark ? '' : 'none';
    if (showSpark) renderSpark(trendVals, trendLabels, budget.v);

    /* ── BUDGET ROW ── */
    var showBudget = actual.v !== null && budget.v !== null && budget.v !== 0;
    $('budget-row').style.display = showBudget ? '' : 'none';
    if (showBudget) {
      var pct     = (actual.v / budget.v) * 100;
      var diffPct = Math.abs(pct - 100).toFixed(1);
      var met     = actual.v >= budget.v;
      var tag     = $('budget-tag');
      tag.className   = 'budget-tag ' + (met ? 'up' : 'dn');
      tag.textContent = (met ? '▲ ' : '▼ ') + diffPct + '% ' + (met ? 'above' : 'below')
                      + ' · ' + (budget.fmt || fmtN(budget.v));
      $('budget-lbl').textContent = budget.field
        ? 'vs ' + pretty(budget.field)
        : 'vs Budget';
    }
  }

  /* =====================================================
     SPARKLINE
  ===================================================== */
  function renderSpark(vals, labels, targetV) {
    var svg = $('spark');
    var W   = svg.clientWidth || 376;
    var H   = 56;
    var P   = { t: 8, r: 8, b: 6, l: 4 };
    var pw  = W - P.l - P.r;
    var ph  = H - P.t - P.b;

    var minV = Math.min.apply(null, vals);
    var maxV = Math.max.apply(null, vals);
    var rng  = maxV - minV || 1;

    function sx(i) { return P.l + (i / (vals.length - 1)) * pw; }
    function sy(v) { return P.t + ph - ((v - minV) / rng) * ph; }

    var pts = vals.map(function(v, i){ return [sx(i), sy(v)]; });

    /* clear */
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

    /* defs: gradient */
    var defs = svgEl('defs');
    var grad = svgEl('linearGradient', { id: 'sg', x1: '0', y1: '0', x2: '0', y2: '1' });
    grad.appendChild(svgEl('stop', { offset: '0%',   'stop-color': '#639922', 'stop-opacity': '0.22' }));
    grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': '#639922', 'stop-opacity': '0.01' }));
    defs.appendChild(grad);
    svg.appendChild(defs);

    /* area fill */
    var aD = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]; }).join(' ')
           + ' L' + pts[pts.length-1][0] + ',' + (H - P.b)
           + ' L' + pts[0][0] + ',' + (H - P.b) + ' Z';
    svg.appendChild(svgEl('path', { d: aD, fill: 'url(#sg)' }));

    /* target dashed line */
    if (targetV !== null) {
      var clamped = Math.min(Math.max(targetV, minV), maxV);
      var ty = sy(clamped);
      svg.appendChild(svgEl('line', {
        x1: P.l, y1: ty, x2: W - P.r, y2: ty,
        stroke: '#d1d5db', 'stroke-width': '1', 'stroke-dasharray': '4,3'
      }));
    }

    /* main line */
    var lineD = pts.map(function(p, i){ return (i === 0 ? 'M' : 'L') + p[0] + ',' + p[1]; }).join(' ');
    svg.appendChild(svgEl('path', {
      d: lineD, fill: 'none',
      stroke: '#639922', 'stroke-width': '2',
      'stroke-linecap': 'round', 'stroke-linejoin': 'round'
    }));

    /* dots coloured vs target */
    function dotColor(v) {
      if (targetV === null) return '#639922';
      return v >= targetV ? '#3b6d11' : '#a32d2d';
    }

    pts.forEach(function(pt, i) {
      var hit = svgEl('circle', { cx: pt[0], cy: pt[1], r: '9', fill: 'transparent' });
      var lbl = (labels[i] ? labels[i] + ' · ' : '') + fmtN(vals[i]);
      hit.addEventListener('mouseenter', function(e){ showTip(e, lbl); });
      hit.addEventListener('mousemove',  moveTip);
      hit.addEventListener('mouseleave', hideTip);

      var dot = svgEl('circle', {
        cx: pt[0], cy: pt[1], r: '3',
        fill: dotColor(vals[i]), stroke: '#fff', 'stroke-width': '1.5'
      });
      svg.appendChild(hit);
      svg.appendChild(dot);
    });

    /* "LATEST" label on last dot */
    var lp = pts[pts.length - 1];
    var ltxt = svgEl('text', {
      x: lp[0] - 5, y: lp[1] - 8,
      'text-anchor': 'end', 'font-size': '8',
      'font-family': "'Inter',sans-serif",
      fill: '#9ca3af', 'letter-spacing': '0.05em'
    });
    ltxt.textContent = 'LATEST';
    svg.appendChild(ltxt);

    /* axis: first and last label */
    var ax = $('spark-axis');
    ax.innerHTML = '';
    if (labels.length >= 2) {
      var s1 = document.createElement('span');
      s1.textContent = labels[0] || '';
      var s2 = document.createElement('span');
      s2.textContent = labels[labels.length - 1] || '';
      ax.appendChild(s1);
      ax.appendChild(s2);
    }
  }

})();
</script>
</body>
</html>
